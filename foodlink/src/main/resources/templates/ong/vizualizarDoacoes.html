<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-4.dtd">

<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/ong/css/vizualizarDoacoes.css}">
    <title>Doações Disponíveis</title>
</head>
<body>

    <div class="container">
        <h1>Doações Disponíveis</h1>
    <form th:action="@{/ong/accept/{id}(id=${donation.id})}">
        <div class="donation-card" th:each="donation : ${donation}">
            <h2>Prato Principal: <span th:text="${donation.getId()}"></span></h2>
            <p><strong>Restaurante:</strong> <span th:text="${donation.getNameRestaurant()}"></span></p>
            <p><strong>Quantidade:</strong> <span th:text="${donation.getQuantity()}"></span></p>
            <p><strong>Data Disponível:</strong> <span th:text="${donation.getDonationDate()}"></span></p>
            <p><strong>Horário da Doação:</strong> <span th:text="${donation.getDonationTime()}"></span></p>
            <div class="details">
                <p><strong>Descrição:</strong> <span th:text="${donation.getDescription()}"></span></p>
                <p><strong>Observações:</strong> <span th:text="${donation.getObservation()}"></span></p>
            </div>
            <a th:href="@{/ong/aceitar-doacao/{id}(id=${donation.id})}" class="button" type="submit">Aceitar Doação</a>
        </div>
    </form>

        <a th:href="@{/dashboard}" class="button" style="color: #FFF; background-color: #6c757d; cursor: pointer">Voltar ao Painel</a>
    </div>
