<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-4.dtd">

<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Doações Realizadas</title>
    <link rel="stylesheet" type="text/css" th:href="@{/restaurant/css/donationsDetails.css}">
</head>
<body>
<div class="container">
    <h1>Detalhes da Doação</h1>
    <div>
        <p><strong>Nome do Restaurante:</strong> <span th:text="${donation.nameRestaurant}"></span> </p>
        <p><strong>Endereço:</strong> <span th:text="${donation.address}"></span></p>
        <p><strong>Telefone de Contato:</strong> </p>
        <p><strong>Email de Contato:</strong> </p>
        <p><strong>Categoria de Alimento:</strong></p>
        <p><strong>Descrição:</strong></p>
        <p><strong>Quantidade:</strong> </p>
        <p><strong>Data da Doação:</strong></p>
        <p><strong>Hora da Doação:</strong></p>
        <p><strong>Observação:</strong></p>
        <p><strong>Método de Retirada:</strong></p>
        <p><strong>Nome da Pessoa que Retira:</strong></p>
        <p><strong>Telefone da Pessoa que Retira:</strong></p>
        <p><strong>Termos Aceitos:</strong></p>
    </div>
    <a th:href="@{/restaurant/mydonations}" class="button">Voltar</a>
</div>
</body>
</html>
